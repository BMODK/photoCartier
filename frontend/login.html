<!DOCTYPE html>
<html lang="pt-br">
<link rel="stylesheet" href="../frontend/css/login.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>

    <div class=login-geral>
        <div class=login-formulario id="container-login">
            <input type="text" id = nome-login placeholder="Login">
            <input type="password" id = senha-login placeholder="Senha">
            <div class=botoes-login>
                <button type="button" id=botao-login> Login </button>
                <button type="button" id=botao-nova-conta> Criar conta </button>
            </div>
        </div>

        <div class="cadastro-formulario escondido" id="container-cadastro">
            <h2>Criar Conta</h2>
            <input type="text" id="novo-usuario" placeholder="Escolha um Usuário">
            <input type="password" id="nova-senha" placeholder="Crie uma Senha">
            <button type="button" id="botao-cadastro"> Cadastrar </button>
            <button type="button" id="botao-voltar"> Voltar </button>
        </div> 
        <div class=login-background>
            <img src="imagens/capalogin.jpg" alt="fundologin">
        </div> 
    </div>

    <script src="js/login.js"></script>
</body>

</html>
