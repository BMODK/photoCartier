<!DOCTYPE html>
<html lang="pt-br">
<link rel="stylesheet" href="../frontend/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body id="pagina-login">
    <div class=login-geral>
        <button class="botao-primario" id="botao-tema-login">
            <i class="fas fa-moon"></i>
        </button>
        <div class=login-formulario id="container-login">
            <input type="text" id=nome-login placeholder="Login">
            <input type="password" id=senha-login placeholder="Senha">
            <div class=botoes-login>
                <button type="button" class="botao-primario" id="botao-login"> Login </button>
                <button type="button" class="botao-secundario" id="botao-nova-conta"> Criar conta </button>
            </div>
        </div>

        <div class="cadastro-formulario escondido" id="container-cadastro">
            <h2>Criar Conta</h2>
            <input type="text" id="novo-usuario" placeholder="Escolha um Usuário">
            <input type="password" id="nova-senha" placeholder="Crie uma Senha">
            <input type="password" id="nova-senha-confirma" placeholder="Confirme a Senha">
            <button type="button" class="botao-primario" id="botao-cadastro"> Cadastrar </button>
            <button type="button" class="botao-secundario" id="botao-voltar"> Voltar </button>
        </div>
        <div class=login-background>
            <img src="imagens/capalogin.jpg" alt="fundologin">
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
